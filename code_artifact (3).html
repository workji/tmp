  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Meiryo', 'Hiragino Kaku Gothic ProN', sans-serif; }
    .empty-cell-fix:empty::before { content: "\00a0"; }
  </style>
</head>
<body class="bg-[#eef0f4] min-h-screen p-4 md:p-8 text-sm">

  <div id="app" class="max-w-5xl mx-auto">
    
    <div class="flex items-center mb-6 pl-2">
      <div class="w-1.5 h-5 bg-[#d9534f] mr-3"></div>
      <h1 class="text-lg font-bold text-gray-800 tracking-wider">契約内容照会</h1>
    </div>

    <div v-if="uiData" class="flex space-x-16 mb-4 px-6 border-b-2 border-[#b0b8c4]">
      <div v-for="tab in uiData.tabs" :key="tab.id"
           @click="activeTabId = tab.id"
           :class="[
             'pb-2 font-bold cursor-pointer relative top-[2px] transition-colors',
             activeTabId === tab.id ? 'text-gray-800 border-b-2 border-gray-800' : 'text-[#627ca6] border-b-2 border-transparent hover:text-gray-600'

        {{ tab.label }}
      </div>
    </div>

    <div v-if="uiData" class="space-y-6">

      <!-- ========================================== -->
      <!-- 1. 共通ヘッダーブロック群 (グレー背景と余白を完全に削除) -->
      <!-- ========================================== -->
      <div class="space-y-4">
        <template v-for="(block, bIdx) in uiData.headerBlocks" :key="'hb-'+bIdx">
          <!-- bg-white と p-[2px] gap-[2px] の組み合わせで、美しい白い罫線を表現 -->
          <div class="grid grid-cols-12 gap-[2px] p-[2px] bg-white">
            <template v-for="(item, iIdx) in processGridItems(block)" :key="'hi-'+bIdx+'-'+iIdx">
              <div v-if="item.isEmptyPadding" :class="[getOuterColClass(item.colSpan), 'bg-[#eaedf2]']"></div>
              <div v-else :class="[getOuterColClass(item.colSpan), 'flex bg-white']">
                <div :class="[getInnerWidthClass(item.labelCol), 'bg-[#627ca6] text-white text-xs md:text-sm font-semibold p-2.5 flex items-center justify-center text-center']">
                  {{ item.label }}
                </div>
                <div :class="[getInnerWidthClass(item.valueCol), 'bg-[#eaedf2] text-gray-800 text-xs md:text-sm p-2.5 flex items-center justify-center text-center whitespace-pre-wrap empty-cell-fix']">
                  {{ item.value }}
                </div>
              </div>
            </template>
          </div>
        </template>
      </div>

      <template v-for="(section, sIdx) in currentTabSections" :key="'sec-'+activeTabId+'-'+sIdx">
        
        <!-- ===================================== -->
        <!-- パターンA: card (内部のグレー背景と余白を削除し、密着させる) -->
        <!-- ===================================== -->
        <div v-if="section.containerStyle === 'card'" class="mb-6">
          
          <div v-if="section.title" class="bg-[#4b669d] text-white px-5 py-2 flex flex-col md:flex-row md:items-center">
            <h2 class="font-bold tracking-widest">{{ section.title }}</h2>
          </div>

          <!-- パディング(p-4)を削除し、flex-colで要素を縦に積む -->
          <div class="border-l-[12px] border-[#4b669d] flex flex-col">
            <div v-if="section.note" class="text-xs text-gray-700 font-bold px-2 pt-2">{{ section.note }}</div>

            <template v-for="(block, blkIdx) in section.blocks" :key="'blk-'+sIdx+'-'+blkIdx">
              <!-- ブロックが複数ある場合や、上に注釈がある場合のみ上部マージン(mt-4)を付与 -->
              <div :class="{'mt-4': blkIdx > 0 || section.note}">
                <h3 v-if="block.subTitle" class="font-bold text-xs text-gray-800 mb-1.5 ml-2">{{ block.subTitle }}</h3>
                
                <!-- 罫線を白に変更 -->
                <div v-if="block.items && block.items.length > 0" class="grid grid-cols-12 gap-[2px] p-[2px] bg-white">
                  <template v-for="(item, iIdx) in processGridItems(block.items)" :key="'di-'+iIdx">
                    <div v-if="item.isEmptyPadding" :class="[getOuterColClass(item.colSpan), 'bg-[#eaedf2]']"></div>
                    <div v-else :class="[getOuterColClass(item.colSpan), 'flex bg-white']">
                      <div :class="[getInnerWidthClass(item.labelCol), 'bg-[#627ca6] text-white text-xs md:text-sm font-semibold p-2.5 flex items-center justify-center text-center']">
                        {{ item.label }}
                      </div>
                      <div :class="[getInnerWidthClass(item.valueCol), 'bg-[#eaedf2] text-gray-800 text-xs md:text-sm p-2.5 flex items-center justify-center text-center whitespace-pre-wrap empty-cell-fix']">
                        {{ item.value }}
                      </div>
                    </div>
                  </template>
                </div>

              </div>
            </template>
            <div v-if="section.footerNote" class="text-xs text-gray-700 font-bold px-2 pt-2 whitespace-pre-wrap">{{ section.footerNote }}</div>

        </div>

        <!-- パターンB: plain -->
        <!-- ===================================== -->

                    </div>

    createApp({
      setup() {
        const uiData = ref(null);
        // 確認しやすいように、初期タブを「契約者情報等(parties)」に変更しています
        const activeTabId = ref('parties'); 

        onMounted(() => {
          uiData.value = MOCK_API_RESPONSE;
        });

        const currentTabSections = computed(() => {
          if (!uiData.value || !activeTabId.value) return [];
          return uiData.value.tabContents[activeTabId.value]?.sections || [];
        });

        const processGridItems = (items) => {
          if (!items || items.length === 0) return [];
          
          let totalSpan = 0;
          const processed = items.map(item => {
            const colSpan = item.colSpan || 6; 
            totalSpan += colSpan;
            return {
              ...item,
              colSpan: colSpan,
              labelCol: item.labelCol || 4,
              valueCol: item.valueCol || 8,
              isEmptyPadding: false
            };
          });

          const remainder = totalSpan % 12;
          if (remainder !== 0) {
            processed.push({
              isEmptyPadding: true,
              colSpan: 12 - remainder
            });
          }
          
          return processed;
        };

        const getOuterColClass = (span) => {
          const map = {
            6: 'col-span-12 md:col-span-6',
            12: 'col-span-12 md:col-span-12'
          };
          return map[span] || 'col-span-12 md:col-span-6';
        };

        const getInnerWidthClass = (col) => {
          const map = {
            2: 'w-3/12 md:w-2/12', 
            4: 'w-5/12 md:w-4/12',
            6: 'w-6/12',
            8: 'w-7/12 md:w-8/12',
            10: 'w-9/12 md:w-10/12'
          };
          return map[col] || 'w-full';
        };

        return {
          uiData,
          activeTabId,
          currentTabSections,
          processGridItems,
          getOuterColClass,
          getInnerWidthClass
        };
      }
